<link rel="stylesheet" href="assets/css/contact.css">
<div class="contact-page">
  <div class="contact-container">
    <section class="contact-hero" aria-label="Contact introduction">
      <div class="contact-copy">
        <p class="contact-kicker">LET'S TALK</p>
        <button class="contact-email" type="button" data-copy-text="HARRYXLIAO@GMAIL.COM" title="Click to copy email">
          HARRYXLIAO@GMAIL.COM
        </button>
        <a class="contact-send" href="mailto:harryxliao@gmail.com?subject=Hello%20Harry">
          SEND EMAIL
        </a>
      </div>

      <div class="contact-video-wrap media-fallback-host">
        <video
          class="contact-video"
          data-fallback="images/Work/For-U_cover.webp"
          autoplay
          muted
          loop
          playsinline
          loading="lazy"
          title="Reno Gordon - For-U"
          tabindex="-1"
          aria-hidden="true"
        >
          <source src="videos/Reno_Gordon_For-U_S.mp4" type="video/mp4">
        </video>
        <div class="contact-overlay"></div>
      </div>

      <div class="contact-video-caption">
        <span>// REACH OUT FOR PROJECTS, COLLABORATIONS, OR JUST TO SAY HI.</span>
      </div>
    </section>
  </div>
</div>
